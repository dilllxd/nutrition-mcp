services:
    db:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: nutrition
            POSTGRES_USER: nutrition
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nutrition}
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U nutrition -d nutrition"]
            interval: 5s
            timeout: 5s
            retries: 10

    app:
        build: .
        restart: unless-stopped
        ports:
            - "${PORT:-8080}:8080"
        environment:
            DATABASE_URL: postgres://nutrition:${POSTGRES_PASSWORD:-nutrition}@db:5432/nutrition
            OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID}
            OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET}
            PORT: "8080"
            ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
        depends_on:
            db:
                condition: service_healthy

volumes:
    postgres_data:
